<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R7 AROMA | Esencias de Autor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            scroll-behavior: smooth;
        }
        h1, h2, h3, .brand-font {
            font-family: 'Playfair Display', serif;
        }
        .gold-text {
            color: #c5a059;
        }
        .gold-bg {
            background-color: #c5a059;
        }
        
        /* Contenedor de producto optimizado para botellas altas */
        .product-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            border-color: #c5a059;
            background: rgba(255, 255, 255, 0.04);
        }
        
        /* Contenedor de imagen: Asegura que el perfume se vea COMPLETO */
        .image-viewport {
            position: relative;
            width: 100%;
            height: 450px; /* Altura generosa para perfumes verticales */
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Fondo sutil para integrar imágenes con fondo blanco */
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 70%);
        }
        
        .product-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* ESTO asegura que el perfume NO se corte */
            transition: transform 0.6s ease;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .cart-dot {
            position: absolute;
            top: -4px;
            right: -4px;
            height: 18px;
            width: 18px;
            background-color: #c5a059;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: black;
            font-weight: 800;
        }

        .hero-gradient {
            background: linear-gradient(to bottom, transparent 0%, rgba(10,10,10,1) 90%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #c5a059; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navegación -->
    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 px-6 md:px-12 py-5 flex justify-between items-center">
        <div class="text-xl md:text-2xl font-bold tracking-[0.3em] brand-font gold-text uppercase">R7 AROMA</div>
        <div class="hidden md:flex space-x-10 text-[10px] uppercase tracking-[0.2em] font-light">
            <a href="#inicio" class="hover:text-[#c5a059] transition">Inicio</a>
            <a href="#coleccion" class="hover:text-[#c5a059] transition">Colección</a>
            <a href="#historia" class="hover:text-[#c5a059] transition">Nosotros</a>
        </div>
        <div class="relative cursor-pointer group" onclick="toggleCart()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:text-[#c5a059] transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <div id="cart-count" class="cart-dot">0</div>
        </div>
    </nav>

    <!-- Hero -->
    <header id="inicio" class="relative h-[80vh] flex items-center justify-center text-center px-4 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover opacity-40">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        <div class="relative z-10 max-w-4xl">
            <h1 class="text-5xl md:text-7xl mb-6 tracking-tight">Fragancias que definen tu Universo</h1>
            <p class="text-gray-400 text-lg mb-10 font-light tracking-wide">Exclusividad en cada atomización.</p>
            <a href="#coleccion" class="gold-bg text-black px-12 py-4 font-bold uppercase tracking-widest hover:bg-white transition duration-500 text-xs">Ver Catálogo</a>
        </div>
    </header>

    <!-- Catálogo -->
    <main class="py-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl mb-4" id="coleccion">Nuestra Selección</h2>
            <div class="h-px w-20 gold-bg mx-auto"></div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Inyectado por JS -->
        </div>
    </main>

    <!-- Carrito -->
    <div id="cart-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex flex-col p-8 md:p-20 overflow-y-auto">
        <div class="flex justify-between items-center mb-12 max-w-2xl mx-auto w-full">
            <h2 class="text-3xl brand-font tracking-wide">Bolsa de Compra</h2>
            <button onclick="toggleCart()" class="text-4xl font-light hover:text-[#c5a059] transition">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 space-y-6 max-w-2xl mx-auto w-full"></div>
        <div class="mt-12 border-t border-white/10 pt-10 max-w-2xl mx-auto w-full">
            <div class="flex justify-between text-xl mb-8">
                <span class="font-light">Total</span>
                <span id="cart-total" class="gold-text">$0.00</span>
            </div>
            <button onclick="checkout()" class="w-full gold-bg text-black py-4 font-bold uppercase tracking-widest hover:bg-white transition duration-500 text-sm">
                Finalizar pedido por WhatsApp
            </button>
        </div>
    </div>

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="image-viewport">
                            <img src="${p.img}" alt="${p.name}" class="product-image" 
                                 onerror="this.src='https://via.placeholder.com/400x600?text=Perfume'">
                        </div>
                        <div class="p-8 text-center bg-black/20">
                            <h3 class="text-2xl mb-1 tracking-wide font-light uppercase">${p.name}</h3>
                            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mb-4">${p.desc}</p>
                            <p class="text-[#c5a059] mb-6 text-xl font-semibold">$${p.price.toFixed(2)}</p>
                            <button onclick="addToCart(${p.id})" class="text-[10px] font-bold uppercase tracking-[0.3em] border border-white/10 px-8 py-3 hover:bg-white hover:text-black transition duration-500 w-full">Seleccionar</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            
            // Notificación simple
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-8 bg-white text-black px-6 py-3 text-[10px] uppercase font-bold tracking-widest z-[100] border-l-4 border-[#c5a059]';
            toast.innerText = `Añadido: ${product.name}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function updateCart() {
            const count = document.getElementById('cart-count');
            const itemsList = document.getElementById('cart-items');
            const totalText = document.getElementById('cart-total');
            
            count.innerText = cart.length;
            itemsList.innerHTML = '';
            let total = 0;
            
            if (cart.length === 0) {
                itemsList.innerHTML = '<p class="text-center text-gray-600 py-20 font-light uppercase tracking-widest">Bolsa vacía</p>';
            } else {
                cart.forEach((item, index) => {
                    total += item.price;
                    itemsList.innerHTML += `
                        <div class="flex justify-between items-center border-b border-white/5 pb-4">
                            <div class="flex items-center gap-4">
                                <img src="${item.img}" class="w-12 h-16 object-contain bg-white/5 p-1">
                                <div>
                                    <p class="text-sm font-light uppercase">${item.name}</p>
                                    <p class="text-xs gold-text">$${item.price.toFixed(2)}</p>
                                </div>
                            </div>
                            <button onclick="removeFromCart(${index})" class="text-gray-500 hover:text-white text-xl">&times;</button>
                        </div>
                    `;
                });
            }
            totalText.innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            document.body.style.overflow = modal.classList.contains('hidden') ? 'auto' : 'hidden';
        }

        function checkout() {
            if (cart.length === 0) return;
            let total = 0;
            let details = "";
            cart.forEach(p => {
                details += `- ${p.name} ($${p.price.toFixed(2)})\n`;
                total += p.price;
            });
            const message = `Hola R7 AROMA! Quiero pedir:\n\n${details}\nTotal: $${total.toFixed(2)}`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        renderProducts();
    </script>
